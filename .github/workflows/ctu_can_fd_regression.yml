      - name: Download compliance lib
        uses: actions/download-artifact@v4
        with:
          name: compliance-lib
          path: test/main_tb/iso-16845-compliance-tests/build

      - name: Run test
        run: |
          cd test
          make tb_rtl_small_asic_max_feature

      - name: Generate logs
        if: always()
        run: |
          cd test
          make tb_rtl_small_asic_max_feature_logs

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_rtl_small_asic_max_feature
          path: |
            test/tb_rtl_small_asic_max_feature.xml
            test/tb_rtl_small_asic_max_feature_summary
            test/tb_rtl_small_asic_max_feature.sim_time
            test/vunit_out/code_coverage

