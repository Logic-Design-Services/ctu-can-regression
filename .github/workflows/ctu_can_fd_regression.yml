  process_coverage:
    runs-on: self-hosted
    needs: test_gate_done
    container:
      image: ghcr.io/logic-design-services/digital-simulation
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout CTU-CAN-FD
        uses: actions/checkout@v4
        with:
          repository: Logic-Design-Services/CTU-CAN-FD
          submodules: recursive
          fetch-depth: 1

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test_rtl_*
          merge-multiple: true

      - name: Merge code coverage
        run: |
          cd test
          echo "Merging code coverage..."
          nvc --cover-merge -V --output=merged.ncdb ../tb_rtl*.ncdb

      - name: Generate code coverage report
        run: |
          cd test
          pwd
          nvc --cover-report --output=code_coverage_report --exclude-file=exclude_files/nvc_exclusions_2v7.txt merged.ncdb

      - name: Export cobertura coverage report
        run: |
          cd test
          pwd
          nvc --cover-export --format=cobertura --output=cobertura_coverage.xml --relative merged.ncdb

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: process_coverage
          path: |
            test/merged.ncdb
            test/code_coverage_report
            test/cobertura_coverage.xml

