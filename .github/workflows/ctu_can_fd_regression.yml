  ##############################################################################
  # RTL feature gate (fan-in — add new feature jobs to needs here)
  ##############################################################################

  test_rtl_feature_done:
    runs-on: self-hosted
    needs:
      - test_rtl_small_asic_max_feature
      - test_rtl_medium_asic_max_feature
      - test_rtl_big_asic_max_feature
      - test_rtl_medium_fpga_max_feature
      - test_rtl_medium_asic_typ_feature
