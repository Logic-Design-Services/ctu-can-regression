name: CTU CAN FD Regression

on:
  workflow_dispatch:

env:
  CTU_TB_TOP_TARGET: tb_ctu_can_fd_rtl_vunit
  TEST_FLAGS: -p24

jobs:

  ##############################################################################
  # Build stage
  ##############################################################################

  build_compliance_lib:
    runs-on: self-hosted
    container:
      image: ghcr.io/logic-design-services/digital-simulation
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout CTU-CAN-FD
        uses: actions/checkout@v4
        with:
          repository: Logic-Design-Services/CTU-CAN-FD
          submodules: recursive
          fetch-depth: 1

      - name: Build compliance library
        run: |
          cd test/main_tb/iso-16845-compliance-tests/
          ./build.sh

      - name: Upload compliance lib
        uses: actions/upload-artifact@v4
        with:
          name: compliance-lib
          path: |
            test/main_tb/iso-16845-compliance-tests/build/Debug/src/cosimulation/libGHDL_VPI_COSIM_LIB.so
            test/main_tb/iso-16845-compliance-tests/build/Debug/src/cosimulation/libNVC_VHPI_COSIM_LIB.so
            test/main_tb/iso-16845-compliance-tests/build/Release/src/cosimulation/libGHDL_VPI_COSIM_LIB.so
            test/main_tb/iso-16845-compliance-tests/build/Release/src/cosimulation/libNVC_VHPI_COSIM_LIB.so

  run_synthesis:
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - name: Checkout CTU-CAN-FD
        uses: actions/checkout@v4
        with:
          repository: Logic-Design-Services/CTU-CAN-FD
          submodules: recursive
          fetch-depth: 1

      - name: Run synthesis
        env:
          PATH: /opt/xilinx/2025.2/Vivado/bin:${{ env.PATH }}
        run: |
          cd synthesis/Vivado/ci_benchmark
          echo "Running minimal configuration..."
          vivado -mode tcl -source vivado_benchmark_small.tcl
          echo "Running typical configuration..."
          vivado -mode tcl -source vivado_benchmark_medium.tcl
          echo "Running maximal configuration..."
          vivado -mode tcl -source vivado_benchmark_big.tcl

          # Remove reference to UNISIM library, all cell models are included in netlist!
          sed -i 's\library UNISIM;\\g' small_design_config/can_top_level.vhd
          sed -i 's\library UNISIM;\\g' medium_design_config/can_top_level.vhd
          sed -i 's\library UNISIM;\\g' big_design_config/can_top_level.vhd

      - name: Upload synthesis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthesis
          retention-days: 1
          path: |
            synthesis/Vivado/ci_benchmark/small_design_config
            synthesis/Vivado/ci_benchmark/medium_design_config
            synthesis/Vivado/ci_benchmark/big_design_config

  ##############################################################################
  # Build gate (fan-in — sync on all build jobs before proceeding)
  ##############################################################################

  build_done:
    runs-on: self-hosted
    needs:
      - build_compliance_lib
      - run_synthesis
    steps:
      - run: echo "Build stage completed"

  ##############################################################################
  # Unit test stage
  ##############################################################################

  test_unit_rx_buffer:
    runs-on: self-hosted
    needs: build_done
    container:
      image: ghcr.io/logic-design-services/digital-simulation
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout CTU-CAN-FD
        uses: actions/checkout@v4
        with:
          repository: Logic-Design-Services/CTU-CAN-FD
          submodules: recursive
          fetch-depth: 1

      - name: Download compliance lib
        uses: actions/download-artifact@v4
        with:
          name: compliance-lib
          path: test/main_tb/iso-16845-compliance-tests/build

      - name: Run test
        run: |
          cd test
          make tb_rtl_rx_buffer_unit

      - name: Generate logs
        if: always()
        run: |
          cd test
          make tb_rtl_rx_buffer_unit_logs

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_unit_rx_buffer
          path: |
            test/tb_rtl_rx_buffer_unit.xml
            test/tb_rtl_rx_buffer_unit_summary

  ##############################################################################
  # Unit test gate (fan-in — add new unit test jobs to needs here)
  ##############################################################################

  test_unit_done:
    runs-on: self-hosted
    needs:
      - test_unit_rx_buffer
    steps:
      - run: echo "All unit tests completed"

  ##############################################################################
  # RTL feature test stage
  ##############################################################################

  test_rtl_small_asic_max_feature:
    runs-on: self-hosted
    needs: test_unit_done
    continue-on-error: true
    timeout-minutes: 120
    container:
      image: ghcr.io/logic-design-services/digital-simulation
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout CTU-CAN-FD
        uses: actions/checkout@v4
        with:
          repository: Logic-Design-Services/CTU-CAN-FD
          submodules: recursive
          fetch-depth: 1

      - name: Download compliance lib
        uses: actions/download-artifact@v4
        with:
          name: compliance-lib
          path: test/main_tb/iso-16845-compliance-tests/build

      - name: Run test
        run: |
          cd test
          pwd
          make tb_rtl_small_asic_max_feature

      - name: Generate logs
        if: always()
        run: |
          cd test
          make tb_rtl_small_asic_max_feature_logs

      - name: Merge code coverage
        if: always()
        run: |
          nvc --cover-merge -V --output=test/tb_rtl_small_asic_max_feature.ncdb test/vunit_out/code_coverage/*.ncdb
          ls -la test/tb_rtl_small_asic_max_feature.ncdb

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_rtl_small_asic_max_feature
          path: |
            test/tb_rtl_small_asic_max_feature.xml
            test/tb_rtl_small_asic_max_feature_summary
            test/tb_rtl_small_asic_max_feature.sim_time
            test/tb_rtl_small_asic_max_feature.ncdb

