    steps:
      - name: Checkout CTU-CAN-FD
        uses: actions/checkout@v4
        with:
          repository: Logic-Design-Services/CTU-CAN-FD
          submodules: recursive
          fetch-depth: 1

      - name: Download test result artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test_rtl_*
          merge-multiple: true

      - name: Generate test matrix
        run: |
          cd scripts
          chmod +x gen_vrm
          ./gen_vrm

      - name: Upload test matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generate_test_matrix
          path: scripts/VRM.html

  ##############################################################################
  # Deploy stage
  ##############################################################################

  assemble_pages:
    runs-on: self-hosted
    needs:
      - process_coverage
      - generate_test_matrix
    container:
      image: ghcr.io/logic-design-services/digital-simulation
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout CTU-CAN-FD
        uses: actions/checkout@v4
        with:
          repository: Logic-Design-Services/CTU-CAN-FD
          submodules: recursive
          fetch-depth: 1

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts
          merge-multiple: false

      - name: Create pages folders
        run: |
          ls -R
          mkdir -p public/regression_results
          mkdir -p public/synthesis
          mkdir -p public/code_coverage_report

      - name: Copy Test summaries and JUnit reports
        run: |
          cp _artifacts/*/*_summary public/regression_results/
          cp _artifacts/*/*.xml   public/regression_results/

      - name: Copy VRM test matrix
        run: |
          cp _artifacts/generate_test_matrix/VRM.html public/regression_results/

      - name: Copy coverage HTML report
        run: |
          cp -r _artifacts/process_coverage/code_coverage_report/* public/code_coverage_report/

      - name: Copy Cobertura XML
        run: |
          cp _artifacts/process_coverage/cobertura_coverage.xml public/

      - name: Copy Merged coverage database
        run: |
          cp _artifacts/process_coverage/merged.ncdb public/

      - name: Synthesis results
        run: |
          cp -r _artifacts/synthesis/small_design_config  public/synthesis/
          cp -r _artifacts/synthesis/medium_design_config public/synthesis/
          cp -r _artifacts/synthesis/big_design_config    public/synthesis/

      - name: Show Pages content
        run: |
          du -skh public/*

      - name: Generate Directory Indexes
        uses: gacts/directory-listing@v1
        with:
          target: public

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: public

  deploy_pages:
    needs: assemble_pages
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
