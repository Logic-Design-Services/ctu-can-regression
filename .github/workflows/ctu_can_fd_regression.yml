      - run: echo "All gate-level tests completed"

  ##############################################################################
  # Coverage stage
  ##############################################################################

  process_coverage:
    runs-on: self-hosted
    needs: test_gate_done
    container:
      image: ghcr.io/logic-design-services/digital-simulation
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout CTU-CAN-FD
        uses: actions/checkout@v4
        with:
          repository: Logic-Design-Services/CTU-CAN-FD
          submodules: recursive
          fetch-depth: 1

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test_rtl_*
          merge-multiple: true

      - name: Merge code coverage
        run: |
          cd test
          echo "Merging code coverage..."
          nvc --cover-merge -V --output=merged.covdb ../tb_rtl*.ncdb

      - name: Generate code coverage report
        run: |
          cd test
          pwd
          nvc --cover-report --output=code_coverage_report --exclude-file=exclude_files/nvc_exclusions_2v7.txt merged.covdb

      - name: Export cobertura coverage report
        run: |
          cd test
          pwd
          nvc --cover-export --format=cobertura --output=cobertura_coverage.xml --relative merged.covdb

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: process_coverage
          path: |
            test/merged.covdb
            test/code_coverage_report
            test/cobertura_coverage.xml

  generate_test_matrix:
    runs-on: self-hosted
    needs: test_gate_done
    container:
      image: ghcr.io/logic-design-services/digital-simulation
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout CTU-CAN-FD
        uses: actions/checkout@v4
        with:
          repository: Logic-Design-Services/CTU-CAN-FD
          submodules: recursive
          fetch-depth: 1

      - name: Download test result artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test_rtl_*
          merge-multiple: true

      - name: Generate test matrix
        run: |
          cd scripts
          chmod +x gen_vrm
          ./gen_vrm

      - name: Upload test matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generate_test_matrix
          path: scripts/VRM.html

  ##############################################################################
  # Deploy stage
  ##############################################################################

  deploy_pages:
    runs-on: self-hosted
    needs:
      - process_coverage
      - generate_test_matrix
    container:
      image: ghcr.io/logic-design-services/digital-simulation
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout CTU-CAN-FD
        uses: actions/checkout@v4
        with:
          repository: Logic-Design-Services/CTU-CAN-FD
          submodules: recursive
          fetch-depth: 1

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts
          merge-multiple: false

      - name: Assemble pages content
        run: |
          mkdir -p public/doc/linux_driver
          mkdir -p public/regression_results
          mkdir -p public/synthesis
          mkdir -p public/code_coverage_report

          # Test summaries and JUnit reports
          cp _artifacts/*/*_summary public/regression_results/ || true
          cp _artifacts/*/*.xml   public/regression_results/ || true

          # VRM test matrix
          cp _artifacts/generate_test_matrix/VRM.html public/regression_results/ || true

          # Code coverage HTML report
          cp -r _artifacts/process_coverage/test/code_coverage_report/* public/code_coverage_report/ || true

          # Cobertura XML
          cp _artifacts/process_coverage/test/cobertura_coverage.xml public/ || true

          # Merged coverage database
          cp _artifacts/process_coverage/test/merged.covdb public/ || true

          # Synthesis results
          cp -r _artifacts/synthesis/small_design_config  public/synthesis/ || true
          cp -r _artifacts/synthesis/medium_design_config public/synthesis/ || true
          cp -r _artifacts/synthesis/big_design_config    public/synthesis/ || true
          cp synthesis/Constraints/ctu_can_fd.sdc         public/synthesis/ || true

          echo "Pages content size:"
          du -skh public/*

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.CTU_CAN_FD_PAGES_TOKEN }}
          external_repository: Logic-Design-Services/CTU-CAN-FD
          publish_branch: gh-pages
          publish_dir: ./public
          keep_files: false
